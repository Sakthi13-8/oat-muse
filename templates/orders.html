<!DOCTYPE html>
<html>
<head>
    <title>Admin Orders</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #333;
            color: white;
        }
    </style>
</head>

<body>

<h2 style="text-align:center;">Customer Orders</h2>

<table>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Address</th>
        <th>Total</th>
        <th>Date</th>
    </tr>

    {% for o in orders %}
    <tr>
        <td>{{ o[0] }}</td>
        <td>{{ o[1] }}</td>
        <td>{{ o[2] }}</td>
        <td>{{ o[3] }}</td>
        <td>{{ o[4] }}</td>
        <td>₹{{ o[5] }}</td>
        <td>{{ o[6] }}</td>
    </tr>
    {% endfor %}

</table>

</body>
</html>
